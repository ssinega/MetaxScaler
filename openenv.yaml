name: cloud-cost-optimizer-env
description: AI environment for optimizing cloud infrastructure costs (FinOps). Agents learn to resize, stop, and tag resources while maintaining performance SLAs.
version: "1.0.0"
python_version: "3.10"
entry_point:
  module: env
  class: SupportEnv
tasks:
  - easy
  - medium
  - hard
tasks_module: env.tasks
graders_module: env.graders
default_max_steps: 10
max_runtime_seconds: 1100
metadata:
  domain: cloud-infrastructure
  action_space: discrete_multi_field
  observation_type: structured_json
  tags:
    - openenv
    - finops
    - cloud-optimization
    - management-sim
    - enterprise-ai
